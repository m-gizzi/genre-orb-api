# Reek configuration for Genre Orb API
# See https://github.com/troessner/reek/blob/master/docs/defaults.reek.yml

exclude_paths:
  - db/migrate
  - bin
  - config
  - spec
  - vendor

directories:
  app/jobs:
    UtilityFunction:
      enabled: false

detectors:
  IrresponsibleModule:
    enabled: false

  MissingSafeMethod:
    enabled: false

  UncommunicativeModuleName:
    accept:
      - V1

  UncommunicativeVariableName:
    accept:
      - e

  UtilityFunction:
    exclude:
      - Auth::RegistrationsController#user_data
      - Auth::SessionsController#user_data
      - Auth::OmniauthCallbacksController#allowed_origins
      - Auth::OmniauthCallbacksController#build_callback_url
      - SpotifyJob#rate_limited?
      - Spotify::ArtistMetadataUpserter#build_metadata
      - Spotify::ArtistMetadataUpserter#build_track_genre_record
      - Spotify::ArtistMetadataUpserter#collect_track_genres
      - Spotify::ArtistMetadataUpserter#insert_genres
      - Spotify::PlaylistSyncSetup#calculate_remaining_pages
      - Spotify::PlaylistSyncSetup#process_first_page_items
      - Spotify::TrackUpserter#build_album_artist_records
      - Spotify::TrackUpserter#build_artist_record
      - Spotify::TrackUpserter#build_track_artist_records
      - Spotify::TrackUpserter#build_track_attributes
      - Spotify::TrackUpserter#extract_release_year

  ControlParameter:
    exclude:
      - Auth::SessionsController#respond_to_on_destroy
      - SpotifyAdapter::RateLimitError#initialize

  FeatureEnvy:
    enabled: false

  NilCheck:
    exclude:
      - ServiceConnection#token_expired?
      - ServiceConnection#token_expiring_soon?
      - Spotify::PlaylistSyncStrategy#snapshot_unchanged?

  TooManyStatements:
    enabled: false

  DuplicateMethodCall:
    enabled: false

  InstanceVariableAssumption:
    enabled: false

  LongParameterList:
    enabled: false

  BooleanParameter:
    exclude:
      - ArtistMetadataSyncJob#perform
      - Spotify::ArtistMetadataSyncInitializer#initialize

  TooManyMethods:
    max_methods: 20

  TooManyInstanceVariables:
    max_instance_variables: 5

  NestedIterators:
    exclude:
      - Spotify::ArtistMetadataUpserter#collect_track_genres

  DataClump:
    exclude:
      - SpotifyAdapter
      - Spotify::PlaylistSyncSetup
      - Spotify::TrackUpserter

  RepeatedConditional:
    exclude:
      - Spotify::PlaylistSyncStrategy