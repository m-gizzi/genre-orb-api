# Reek configuration for Genre Orb API
# See https://github.com/troessner/reek/blob/master/docs/defaults.reek.yml

exclude_paths:
  - db/migrate
  - bin
  - config
  - spec
  - vendor

detectors:
  IrresponsibleModule:
    enabled: false

  MissingSafeMethod:
    enabled: false

  UncommunicativeModuleName:
    accept:
      - V1

  UncommunicativeVariableName:
    accept:
      - e

  UtilityFunction:
    enabled: false

  ControlParameter:
    exclude:
      - Auth::SessionsController#respond_to_on_destroy
      - SpotifyAdapter::RateLimitError#initialize

  FeatureEnvy:
    enabled: false

  NilCheck:
    exclude:
      - BaseController#render_data
      - ServiceConnection#token_expired?
      - ServiceConnection#token_expiring_soon?
      - Spotify::PlaylistSyncStrategy#snapshot_unchanged?
      - Tracks::Filter#filter_explicit

  TooManyStatements:
    enabled: false

  DuplicateMethodCall:
    enabled: false

  InstanceVariableAssumption:
    enabled: false

  LongParameterList:
    enabled: false

  BooleanParameter:
    exclude:
      - ArtistMetadataSyncJob#perform
      - Spotify::ArtistMetadataSyncInitializer#initialize

  TooManyMethods:
    max_methods: 20

  TooManyInstanceVariables:
    max_instance_variables: 5

  NestedIterators:
    exclude:
      - Spotify::ArtistMetadataUpserter#collect_track_genre_pairs
      - Spotify::TrackUpserter#genre_pairs_for_track

  DataClump:
    exclude:
      - SpotifyAdapter
      - Spotify::PlaylistSyncSetup
      - Spotify::TrackUpserter

  RepeatedConditional:
    exclude:
      - Spotify::PlaylistSyncStrategy
      - Tracks::Filter
